<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0C16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hábitos">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<title>Hábitos RPG</title>
<style>
  :root{
    --bg:#0A0C16; --surface:#131830; --line:#232A4A; --txt:#E8EAF6;
    --muted:#8B93B8; --dim:#5A6285; --oro:#FFD700; --rojo:#FF5C5C;
    --ambar:#FFB454; --violeta:#7C5CFF; --cian:#4ED6FF; --verde:#5EF0A0; --rosa:#FF6E9C;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--txt);font-family:system-ui,sans-serif;overflow:hidden}
  .paginas{display:flex;width:100%;height:100%;overflow-x:auto;overflow-y:hidden;
    scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .paginas::-webkit-scrollbar{display:none}
  .pagina{min-width:100%;height:100%;overflow-y:auto;scroll-snap-align:start;scroll-snap-stop:always;
    padding:max(16px,env(safe-area-inset-top)) 16px 110px}
  .wrap{max-width:430px;margin:0 auto}
  .dots{position:fixed;bottom:max(16px,env(safe-area-inset-bottom));left:0;right:0;
    display:flex;justify-content:center;gap:6px;pointer-events:none;z-index:10}
  .dot{width:7px;height:7px;border-radius:99px;background:#2A3152;transition:all .3s}
  .dot.activo{background:var(--violeta);width:18px}
  .mono{font-family:ui-monospace,monospace}
  .fila-top{display:flex;justify-content:space-between;align-items:flex-end}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted)}
  .titulo{font-size:24px;font-weight:700;line-height:1.2}
  .desc{font-size:12px;color:var(--muted)}
  .xp{font-size:18px;color:var(--ambar)}
  .chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
  .chip{font-size:11px;padding:4px 8px;border-radius:999px;font-weight:600;
    background:rgba(255,215,0,.13);color:var(--oro);border:1px solid rgba(255,215,0,.33)}
  .barra{height:8px;border-radius:999px;overflow:hidden;background:var(--surface);margin:12px 0 20px}
  .barra>div{height:100%;border-radius:999px;background:linear-gradient(90deg,#FFB454,#FF6E9C);
    transition:width .7s ease}
  svg.radar{display:block;width:100%;max-width:300px;margin:0 auto}
  .statsnum{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:10px 0 6px;text-align:center}
  .statsnum b{font-size:14px}
  .mini-barra{height:5px;background:#0F1322;border:1px solid #1B2138;border-radius:99px;
    overflow:hidden;margin-top:4px}
  .mini-barra>div{height:100%;border-radius:99px;transition:width .7s ease}
  .hint{font-size:11px;text-align:center;color:var(--dim);margin:4px 0 14px}
  .aviso-decay{font-size:11px;text-align:center;color:#FF8C8C;margin-bottom:14px}
  .btn{border:none;border-radius:10px;font-weight:600;cursor:pointer;font-size:13px}
  .btn-ancho{display:block;width:100%;padding:10px;background:var(--surface);
    border:1px solid var(--line);color:var(--muted);margin-bottom:12px;border-radius:12px;
    font-weight:600;font-size:13px;cursor:pointer}
  .fila-lista{display:flex;justify-content:space-between;align-items:center;margin:4px 0 10px}
  .btn-add{background:var(--violeta);color:#fff;padding:6px 12px;border-radius:10px}
  .habito{display:flex;align-items:center;gap:10px;border-radius:12px;padding:11px 12px;
    background:var(--surface);border:1px solid var(--line);margin-bottom:8px}
  .check{width:28px;height:28px;border-radius:8px;border:2px solid;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-weight:700;
    background:transparent;color:#0A0C16;font-size:14px}
  .h-info{flex:1;min-width:0}
  .h-nombre{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .h-meta{font-size:11px;display:flex;flex-wrap:wrap;gap:0 8px}
  .h-xp{font-size:11px;flex-shrink:0;color:var(--muted)}
  .h-del{background:none;border:none;color:var(--dim);font-size:12px;padding:2px 4px;cursor:pointer}
  .seccion-mal{font-size:12px;text-transform:uppercase;letter-spacing:.15em;color:var(--rojo);
    margin:22px 0 10px}
  .form{background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:12px;margin-bottom:14px;display:none}
  .form.abierto{display:block}
  .form input[type=text]{width:100%;background:var(--bg);border:1px solid var(--line);
    border-radius:8px;color:var(--txt);padding:9px 10px;font-size:14px;outline:none;margin-bottom:8px}
  .grupo{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px}
  .toggle-btn{padding:8px;border-radius:8px;font-size:12px;font-weight:600;
    background:transparent;border:1px solid;cursor:pointer}
  .form .lblmini{font-size:11px;color:var(--muted);margin:4px 0}
  .cats-form{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
  .cat-chip{font-size:11px;padding:4px 8px;border-radius:8px;font-weight:600;
    background:transparent;border:1px solid;cursor:pointer}
  .xp-preview{font-size:11px;text-align:right;color:var(--muted);margin-bottom:8px}
  .btn-submit{width:100%;padding:10px;background:var(--cian);color:#0A0C16;
    border-radius:8px;font-weight:700}
  .stepper{display:flex;gap:4px;align-items:stretch}
  .stepper .mini{width:30px;background:var(--bg);border:1px solid var(--line);
    color:var(--txt);border-radius:8px;font-weight:700;cursor:pointer}
  .vacio{text-align:center;padding:36px 0;font-size:13px;color:var(--muted)}
  .footer-datos{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:24px}
  .footer-datos button{padding:9px;border-radius:10px;font-size:12px;font-weight:600;
    background:var(--surface);border:1px solid var(--line);color:var(--muted);cursor:pointer}
  .nota-datos{font-size:10px;color:var(--dim);text-align:center;margin-top:6px}
  /* página de logros */
  .pag-titulo{font-size:22px;font-weight:700;margin-bottom:2px}
  .pag-sub{font-size:12px;color:var(--muted);margin-bottom:18px}
  .sec-logros{font-size:12px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);
    margin:20px 0 10px}
  .logro{display:flex;gap:12px;align-items:center;background:var(--surface);
    border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px}
  .logro.on{border-color:rgba(255,215,0,.45);box-shadow:0 0 10px rgba(255,215,0,.07)}
  .logro.off{opacity:.45}
  .logro.oscuro{border-color:rgba(255,92,92,.4)}
  .l-ico{font-size:20px;width:28px;text-align:center;flex-shrink:0}
  .l-txt{flex:1;min-width:0}
  .l-n{font-size:13px;font-weight:600}
  .l-d{font-size:11px;color:var(--muted)}
  .l-p{font-size:11px;color:var(--muted);flex-shrink:0;text-align:right}

  /* ===== página de agenda / voz ===== */
  .ag-h1{font-size:22px;font-weight:700;margin-bottom:2px}
  .ag-sub{font-size:12px;color:var(--muted);margin-bottom:18px}
  .ag-cap{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px}
  .ag-cap>label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin-bottom:8px}
  .ag-bar{display:flex;gap:8px;align-items:stretch}
  #ag-texto{flex:1;background:var(--bg);color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:16px;resize:none;min-height:48px;font-family:inherit;outline:none;line-height:1.35}
  #ag-texto:focus{border-color:var(--cian)}
  #ag-texto::placeholder{color:var(--dim)}
  #ag-add{border:none;border-radius:10px;background:linear-gradient(135deg,var(--cian),var(--violeta));color:#0A0C16;font-size:22px;font-weight:700;min-width:56px;cursor:pointer}
  #ag-add:active{transform:scale(.96)}
  .ag-tip{font-size:11px;color:var(--dim);margin-top:9px}
  .ag-tip b{color:var(--muted)}
  .ag-prev{margin-top:12px;border:1px dashed var(--violeta);border-radius:12px;padding:12px;background:rgba(124,92,255,.08)}
  .ag-prev .r{display:flex;gap:8px;margin-bottom:8px}
  .ag-prev .h{flex:1;min-width:0}
  .ag-prev .l{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:4px}
  .ag-prev input,.ag-prev select{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px 10px;font-size:15px;font-family:inherit;outline:none}
  .ag-prev .ck{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);padding:9px 0}
  .ag-prev .acts{display:flex;gap:8px;margin-top:4px}
  .ag-prev .acts button{flex:1;padding:11px;border:none;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer}
  #ag-ok{background:var(--verde);color:#062314}
  #ag-no{background:var(--surface);border:1px solid var(--line);color:var(--muted)}
  .ag-list{margin-top:24px}
  .ag-empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 12px;border:1px dashed var(--line);border-radius:12px}
  .ag-empty b{display:block;color:var(--txt);margin-bottom:4px;font-size:14px}
  .ag-toast{position:fixed;left:50%;bottom:70px;transform:translateX(-50%) translateY(16px);background:var(--surface);border:1px solid var(--cian);color:var(--txt);padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:20;box-shadow:0 10px 26px -12px #000}
  .ag-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .ag-wnav{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .ag-wbtn{background:var(--surface);border:1px solid var(--line);color:var(--muted);width:38px;height:38px;border-radius:10px;font-size:14px;cursor:pointer;flex-shrink:0}
  .ag-wbtn:active{transform:scale(.92)}
  .ag-wttl{flex:1;text-align:center;line-height:1.25}
  .ag-wttl b{display:block;font-size:14px}
  .ag-wttl span{font-size:11px;color:var(--dim)}
  .ag-whoy{background:none;border:none;color:var(--cian);font-size:11px;cursor:pointer;text-decoration:underline;padding:0}
  .ag-dia{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:9px 11px;margin-bottom:8px}
  .ag-dia.hoy{border-color:var(--oro);box-shadow:0 0 10px rgba(255,215,0,.07)}
  .ag-dia.pasado{opacity:.5}
  .ag-dhdr{display:flex;align-items:baseline;gap:7px;margin-bottom:6px}
  .ag-ddw{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--muted)}
  .ag-dia.hoy .ag-ddw{color:var(--oro)}
  .ag-dnum{font-family:ui-monospace,monospace;font-size:13px;color:var(--txt)}
  .ag-dtag{font-size:9px;text-transform:uppercase;letter-spacing:.1em;background:rgba(255,215,0,.15);color:var(--oro);border:1px solid rgba(255,215,0,.4);padding:1px 6px;border-radius:99px}
  .ag-dhab{margin-left:auto;font-size:10px;color:var(--verde)}
  .ag-libre{font-size:12px;color:#3A4060;padding:1px 0 2px}
  .ag-ev{display:flex;gap:8px;align-items:center;border-left:3px solid var(--cian);background:var(--bg);border-radius:8px;padding:7px 9px;margin-bottom:5px}
  .ag-ev.rep{border-left-color:var(--violeta)}
  .ag-ev .t{font-family:ui-monospace,monospace;font-weight:700;font-size:12px;color:var(--cian);min-width:40px;flex-shrink:0}
  .ag-ev.rep .t{color:var(--violeta)}
  .ag-ev .ad{font-size:9px;color:var(--dim);min-width:40px;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
  .ag-ev .nm{flex:1;min-width:0;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ag-ev .bg{font-size:11px;color:var(--violeta);flex-shrink:0}
  .ag-ev .ac{display:flex;gap:5px;flex-shrink:0}
  .ag-ib{background:var(--bg);border:1px solid var(--line);color:var(--muted);width:34px;height:34px;border-radius:9px;font-size:14px;cursor:pointer;line-height:1}
  .ag-ib:active{transform:scale(.9)}
  .ag-ev .ag-ib{width:29px;height:29px;font-size:12px}
  .ag-back{font-size:11px;text-align:center;color:var(--dim);margin-top:22px}
</style>
</head>
<body>
<div class="paginas" id="paginas">

  <!-- PÁGINA 0: Agenda / Voz -->
  <section class="pagina"><div class="wrap" id="pag-agenda"></div></section>

  <!-- PÁGINA 1: Hoy -->
  <section class="pagina"><div class="wrap">
    <div id="header"></div>
    <div id="radarwrap"></div>
    <div id="statsnum"></div>
    <div class="hint">◀ Agenda&nbsp;&nbsp;·&nbsp;&nbsp;Rachas y logros ▶</div>
    <div id="decayaviso"></div>
    <div class="fila-lista">
      <span class="lbl" id="contador"></span>
      <button class="btn btn-add" onclick="toggleForm()">+ Hábito</button>
    </div>
    <div class="form" id="form">
      <input type="text" id="f-nombre" placeholder='Ej.: "Meditar 10 min"'>
      <div class="grupo">
        <button class="toggle-btn" id="t-bueno" onclick="setTipo('bueno')">✦ Bueno (suma)</button>
        <button class="toggle-btn" id="t-malo" onclick="setTipo('malo')">☠ Malo (resta)</button>
      </div>
      <div class="grupo" id="freq-grupo">
        <button class="toggle-btn" id="f-diario" onclick="setFreq('diario')">Diario</button>
        <div class="stepper">
          <button class="toggle-btn" id="f-semanal" style="flex:1" onclick="setFreq('semanal')"></button>
          <button class="mini" onclick="cambiaObj(-1)">−</button>
          <button class="mini" onclick="cambiaObj(1)">+</button>
        </div>
      </div>
      <div class="lblmini">Afecta a (toca varias):</div>
      <div class="cats-form" id="cats-form"></div>
      <div class="xp-preview" id="xp-preview"></div>
      <button class="btn-submit" onclick="addHabit()">Añadir</button>
    </div>
    <div id="lista-buenos"></div>
    <div id="seccion-malos"></div>
    <div class="footer-datos">
      <button onclick="exportar()">💾 Exportar copia</button>
      <button onclick="document.getElementById('importfile').click()">📥 Importar copia</button>
    </div>
    <div class="nota-datos">Tus datos viven solo en este navegador. Exporta una copia de vez en cuando.</div>
    <input type="file" id="importfile" accept=".json,application/json" style="display:none" onchange="importar(event)">
  </div></section>

  <!-- PÁGINA 2: Logros -->
  <section class="pagina"><div class="wrap" id="pag-logros"></div></section>

</div>
<div class="dots"><span class="dot" id="dot0"></span><span class="dot activo" id="dot1"></span><span class="dot" id="dot2"></span></div>

<script>
// ================= Config =================
const CATS = [
  { id:"cuerpo", name:"Cuerpo", color:"#4ED6FF" },
  { id:"mente", name:"Mente", color:"#7C5CFF" },
  { id:"disciplina", name:"Disciplina", color:"#FFB454" },
  { id:"social", name:"Social", color:"#FF6E9C" },
  { id:"energia", name:"Energía", color:"#5EF0A0" },
];
const XP_POS = 10, XP_NEG = 15;
const DECAY_GRACIA = 2, DECAY_DIARIO = 0.98, DECAY_SUELO = 0.6;
const KEY = "habit-rpg";

const PRESETS = [
  { name:"Fumar", tipo:"malo", cats:["cuerpo","energia"], freq:{tipo:"diario"} },
  { name:"Hacer deporte", tipo:"bueno", cats:["cuerpo","energia","disciplina"], freq:{tipo:"semanal",objetivo:3}, titulo:"Espartano" },
  { name:"Leer", tipo:"bueno", cats:["mente"], freq:{tipo:"diario"} },
  { name:"Hablar con 5 personas", tipo:"bueno", cats:["social"], freq:{tipo:"diario"} },
  { name:"Caer", tipo:"malo", cats:["disciplina","energia"], freq:{tipo:"diario"} },
  { name:"1h a un proyecto", tipo:"bueno", cats:["mente","disciplina"], freq:{tipo:"semanal",objetivo:4}, titulo:"Constructor" },
  { name:"+1h seguida con el móvil", tipo:"malo", cats:["mente","disciplina"], freq:{tipo:"diario"} },
  { name:"Estudiar 1h+ (uni)", tipo:"bueno", cats:["mente","disciplina"], freq:{tipo:"diario"} },
  { name:"Dormir antes de las 00:30", tipo:"bueno", cats:["energia","disciplina"], freq:{tipo:"diario"} },
  { name:"Planificar el día (5 min)", tipo:"bueno", cats:["disciplina"], freq:{tipo:"diario"} },
  { name:"Comida basura", tipo:"malo", cats:["cuerpo","energia"], freq:{tipo:"diario"} },
  { name:"Quedar con amigos", tipo:"bueno", cats:["social","energia"], freq:{tipo:"semanal",objetivo:2}, titulo:"Alma del grupo" },
  { name:"Llamar a un amigo o familiar", tipo:"bueno", cats:["social"], freq:{tipo:"semanal",objetivo:2}, titulo:"Cercano" },
];
const TITULOS_STAT = { cuerpo:"Titán", mente:"Erudito", disciplina:"Estratega", social:"Carismático", energia:"Dínamo" };

const LOGROS = [
  { id:"primero", n:"Primer paso", d:"Completa tu primer hábito", ico:"🌱",
    check:c=>c.totalBuenas>=1, prog:c=>Math.min(1,c.totalBuenas)+"/1" },
  { id:"r3", n:"En llamas", d:"Racha de 3 días en un hábito (x1.5 XP)", ico:"🔥",
    check:c=>c.mejorRacha>=3, prog:c=>Math.min(3,c.mejorRacha)+"/3" },
  { id:"r7", n:"Imparable", d:"Racha de 7 días (x2 XP)", ico:"⚡",
    check:c=>c.mejorRacha>=7, prog:c=>Math.min(7,c.mejorRacha)+"/7" },
  { id:"r30", n:"Leyenda viva", d:"Racha de 30 días en un hábito", ico:"🐉",
    check:c=>c.mejorRacha>=30, prog:c=>Math.min(30,c.mejorRacha)+"/30" },
  { id:"limpio7", n:"Escudo templado", d:"7 días limpio de un vicio", ico:"🛡️",
    check:c=>c.mejorLimpio>=7, prog:c=>Math.min(7,c.mejorLimpio)+"/7" },
  { id:"limpio30", n:"Voluntad de hierro", d:"30 días limpio de un vicio", ico:"⚔️",
    check:c=>c.mejorLimpio>=30, prog:c=>Math.min(30,c.mejorLimpio)+"/30" },
  { id:"cien", n:"Centurión", d:"100 hábitos completados en total", ico:"🏛️",
    check:c=>c.totalBuenas>=100, prog:c=>Math.min(100,c.totalBuenas)+"/100" },
  { id:"quini", n:"Imperator", d:"500 hábitos completados en total", ico:"👑",
    check:c=>c.totalBuenas>=500, prog:c=>Math.min(500,c.totalBuenas)+"/500" },
  { id:"nivel5", n:"Aventurero", d:"Alcanza el nivel 5", ico:"🗡️",
    check:c=>c.nivel>=5, prog:c=>Math.min(5,c.nivel)+"/5" },
  { id:"nivel10", n:"Veterano", d:"Alcanza el nivel 10", ico:"🏆",
    check:c=>c.nivel>=10, prog:c=>Math.min(10,c.nivel)+"/10" },
  { id:"nivel25", n:"Élite", d:"Alcanza el nivel 25", ico:"💎",
    check:c=>c.nivel>=25, prog:c=>Math.min(25,c.nivel)+"/25" },
];

// ================= Estado =================
let D = { habits:[], log:{}, meta:{} };
try {
  const raw = localStorage.getItem(KEY);
  if (raw) D = JSON.parse(raw);
} catch(e){}
if (!D.habits) D.habits = [];
if (!D.log) D.log = {};
if (!D.meta) D.meta = {};
if (!D.meta.logros) D.meta.logros = {};
if (!D.meta.titulos) D.meta.titulos = {};

if (!D.meta.v5) {
  D.habits.forEach(h=>{ if (h.name.toLowerCase()==="caer (nofap)") h.name = "Caer"; });
  const del = new Set(D.habits.filter(h=>h.name.toLowerCase().startsWith("psicotécnicos")).map(h=>h.id));
  if (del.size){
    D.habits = D.habits.filter(h=>!del.has(h.id));
    for (const f of Object.keys(D.log)){
      D.log[f] = D.log[f].filter(id=>!del.has(id));
      if (!D.log[f].length) delete D.log[f];
    }
  }
  D.meta.v5 = true;
}
if (!D.meta.seeded5) {
  const exist = new Set(D.habits.map(h=>h.name.toLowerCase()));
  PRESETS.forEach((p,i)=>{
    if (!exist.has(p.name.toLowerCase()))
      D.habits.push({...p, id:"p"+Date.now().toString(36)+i, createdAt:hoy()});
  });
  D.meta.seeded = true;
  D.meta.seeded5 = true;
}
guardar();

function guardar(){ try{ localStorage.setItem(KEY, JSON.stringify(D)); }catch(e){} }

// ================= Utilidades =================
function hoy(){ return new Date().toLocaleDateString("sv"); }
function diasAtras(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.toLocaleDateString("sv"); }
function difDias(a,b){ return Math.round((new Date(b)-new Date(a))/864e5); }
function lunesSemana(){ const d=new Date(); d.setDate(d.getDate()-((d.getDay()+6)%7)); return d.toLocaleDateString("sv"); }
function statValor(xp){ return Math.round(100*(xp/(xp+300))); }
function nivelDe(xp){ return Math.floor(Math.sqrt(xp/25))+1; }
function xpNivel(l){ return Math.pow(l-1,2)*25; }
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function cat(id){ return CATS.find(c=>c.id===id); }
function multDeRun(run){ return run>=7 ? 2 : run>=3 ? 1.5 : 1; }
function fechasDe(id){ return Object.keys(D.log).filter(f=>D.log[f].includes(id)).sort(); }

// ================= Cálculos =================
function mapaMults(){
  const m = {};
  for (const h of D.habits){
    if (h.tipo!=="bueno" || h.freq.tipo!=="diario") continue;
    let run = 0, prev = null;
    const mm = {};
    for (const f of fechasDe(h.id)){
      run = (prev && difDias(prev,f)===1) ? run+1 : 1;
      mm[f] = multDeRun(run);
      prev = f;
    }
    m[h.id] = mm;
  }
  return m;
}

function recordRacha(id){
  let mejor=0, run=0, prev=null;
  for (const f of fechasDe(id)){
    run = (prev && difDias(prev,f)===1) ? run+1 : 1;
    if (run>mejor) mejor=run;
    prev=f;
  }
  return mejor;
}

function limpios(h){
  const fechas = fechasDe(h.id);
  const F = hoy();
  if (!fechas.length){
    const d = Math.max(0, difDias(h.createdAt, F));
    return { actual:d, record:d };
  }
  let record = Math.max(0, difDias(h.createdAt, fechas[0]));
  for (let i=1;i<fechas.length;i++)
    record = Math.max(record, difDias(fechas[i-1], fechas[i])-1);
  const actual = Math.max(0, difDias(fechas[fechas.length-1], F));
  record = Math.max(record, actual);
  return { actual, record };
}

function calcular(){
  const mults = mapaMults();
  const xpCat = {}; CATS.forEach(c=>xpCat[c.id]=0);
  const ultAct = {}; CATS.forEach(c=>ultAct[c.id]=null);
  let xpTotal = 0, totalBuenas = 0;
  for (const f of Object.keys(D.log)){
    for (const hid of D.log[f]){
      const h = D.habits.find(x=>x.id===hid);
      if (!h) continue;
      if (h.tipo==="bueno") totalBuenas++;
      const delta = h.tipo==="malo" ? -XP_NEG : XP_POS * ((mults[h.id]||{})[f]||1);
      for (const c of h.cats){
        if (xpCat[c]===undefined) continue;
        xpCat[c]+=delta; xpTotal+=delta;
        if (h.tipo==="bueno" && (!ultAct[c] || f>ultAct[c])) ultAct[c]=f;
      }
    }
  }
  CATS.forEach(c=>xpCat[c.id]=Math.max(0,xpCat[c.id]));
  xpTotal = Math.max(0,xpTotal);
  const F = hoy();
  const decayendo = [], valores = CATS.map(c=>{
    let xp = xpCat[c.id], dec = false;
    if (xp>0 && ultAct[c.id]){
      const ina = difDias(ultAct[c.id], F);
      if (ina>DECAY_GRACIA){ xp *= Math.max(DECAY_SUELO, Math.pow(DECAY_DIARIO, ina-DECAY_GRACIA)); dec=true; }
    }
    decayendo.push(dec);
    return statValor(xp);
  });
  return { valores, decayendo, xpTotal: Math.round(xpTotal), totalBuenas };
}

function racha(id){
  const F = hoy();
  let r=0, i=(D.log[F]||[]).includes(id)?0:1;
  while (i<=365){ const f=diasAtras(i); if((D.log[f]||[]).includes(id)){r++;i++;} else break; }
  return r;
}
function vecesSemana(id){
  const lun=lunesSemana(), F=hoy(); let n=0;
  for (const f of Object.keys(D.log)) if (f>=lun&&f<=F&&D.log[f].includes(id)) n++;
  return n;
}

// ================= Acciones =================
function toggle(id){
  const F = hoy();
  const dia = D.log[F]||[];
  D.log[F] = dia.includes(id) ? dia.filter(x=>x!==id) : [...dia,id];
  if (!D.log[F].length) delete D.log[F];
  guardar(); render();
}
function borrarHabit(id){
  if (!confirm("¿Eliminar este hábito y su historial?")) return;
  D.habits = D.habits.filter(h=>h.id!==id);
  for (const f of Object.keys(D.log)){
    D.log[f]=D.log[f].filter(x=>x!==id);
    if (!D.log[f].length) delete D.log[f];
  }
  guardar(); render();
}

function exportar(){
  const blob = new Blob([JSON.stringify(D,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "habitos-backup-"+hoy()+".json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}
function importar(ev){
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const d = JSON.parse(reader.result);
      if (!d || !Array.isArray(d.habits) || typeof d.log!=="object") throw new Error("formato");
      if (!confirm("Esto reemplazará tus datos actuales por los de la copia. ¿Continuar?")) return;
      D = d;
      if (!D.meta) D.meta = {};
      if (!D.meta.logros) D.meta.logros = {};
      if (!D.meta.titulos) D.meta.titulos = {};
      guardar(); render();
      alert("Copia importada correctamente ✔");
    }catch(e){ alert("El archivo no es una copia válida."); }
  };
  reader.readAsText(file);
  ev.target.value = "";
}

let fTipo="bueno", fFreq="diario", fObj=3, fCats=["disciplina"];
function toggleForm(){ document.getElementById("form").classList.toggle("abierto"); renderForm(); }
function setTipo(t){ fTipo=t; renderForm(); }
function setFreq(f){ fFreq=f; renderForm(); }
function cambiaObj(d){ fObj=Math.min(7,Math.max(1,fObj+d)); fFreq="semanal"; renderForm(); }
function toggleCatF(id){
  fCats = fCats.includes(id) ? (fCats.length>1?fCats.filter(x=>x!==id):fCats) : [...fCats,id];
  renderForm();
}
function addHabit(){
  const inp = document.getElementById("f-nombre");
  const nombre = inp.value.trim();
  if (!nombre || !fCats.length) return;
  D.habits.push({
    id: Date.now().toString(36), name:nombre, tipo:fTipo, cats:[...fCats],
    createdAt: hoy(),
    freq: (fTipo==="bueno"&&fFreq==="semanal") ? {tipo:"semanal",objetivo:fObj} : {tipo:"diario"},
    titulo: null,
  });
  inp.value="";
  document.getElementById("form").classList.remove("abierto");
  guardar(); render();
}

// ================= Render =================
function radarSVG(valores, decayendo){
  const size=280, cx=140, cy=140, R=100, n=CATS.length;
  const ang=i=>Math.PI*2*i/n-Math.PI/2;
  const pt=(i,r)=>[cx+r*Math.cos(ang(i)), cy+r*Math.sin(ang(i))];
  let s=`<svg class="radar" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#7C5CFF" stop-opacity=".85"/>
    <stop offset="100%" stop-color="#4ED6FF" stop-opacity=".85"/></linearGradient></defs>`;
  for (const f of [0.25,0.5,0.75,1])
    s+=`<polygon points="${CATS.map((_,i)=>pt(i,R*f).join(",")).join(" ")}" fill="none" stroke="#232A4A"/>`;
  CATS.forEach((_,i)=>{ const [x,y]=pt(i,R); s+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#232A4A"/>`; });
  s+=`<polygon points="${valores.map((v,i)=>pt(i,Math.max(6,v/100*R)).join(",")).join(" ")}"
    fill="url(#g)" stroke="#9D8CFF" stroke-width="2" stroke-linejoin="round"/>`;
  CATS.forEach((c,i)=>{
    const [x,y]=pt(i,R+22);
    s+=`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle"
      font-size="11" fill="${c.color}" font-weight="600">${c.name}${decayendo[i]?" ▼":""}</text>`;
  });
  valores.forEach((v,i)=>{ const [x,y]=pt(i,Math.max(6,v/100*R)); s+=`<circle cx="${x}" cy="${y}" r="3" fill="${CATS[i].color}"/>`; });
  return s+"</svg>";
}

function filaHabito(h){
  const F=hoy(), done=(D.log[F]||[]).includes(h.id);
  const malo = h.tipo==="malo", semanal = h.freq.tipo==="semanal";
  const color = malo ? "#FF5C5C" : cat(h.cats[0]).color;
  const sem = vecesSemana(h.id);
  const corona = semanal && sem>=h.freq.objetivo;
  const r = malo ? limpios(h).actual : racha(h.id);
  const mult = (!malo && !semanal) ? multDeRun(done ? r : r+1) : 1;
  let extra = "";
  if (malo) extra = done ? '<span style="color:#FF5C5C">hoy has caído</span>'
    : (r>0 ? `<span style="color:#5EF0A0">🛡️ ${r} ${r===1?"día":"días"} limpio</span>` : "");
  else if (semanal) extra = `<span style="color:${corona?"#FFD700":"#8B93B8"}">${sem}/${h.freq.objetivo} esta semana${corona?(h.titulo?` · 👑 ${esc(h.titulo)}`:" · 👑"):""}</span>`;
  else {
    const partes = [];
    if (r>1) partes.push(`🔥 ${r} días`);
    if (mult>1) partes.push(`<b style="color:#FFD700">x${mult}</b>`);
    if (partes.length) extra = `<span style="color:#FFB454">${partes.join(" · ")}</span>`;
  }
  const xpMostrar = malo ? XP_NEG*h.cats.length : Math.round(XP_POS*mult)*h.cats.length;
  return `<div class="habito" style="${[
      done?`background:${malo?"#2A1420":"#16203A"}`:"",
      `border-color:${corona?"#FFD700":done?color+"66":"#232A4A"}`,
      corona?"box-shadow:0 0 8px rgba(255,215,0,.2)":""
    ].filter(Boolean).join(";")}">
    <button class="check" onclick="toggle('${h.id}')"
      style="border-color:${color};${done?`background:${color}`:""}">${done?(malo?"✕":"✓"):""}</button>
    <div class="h-info">
      <div class="h-nombre" style="${done&&!malo?"text-decoration:line-through;opacity:.6":""}">${esc(h.name)}</div>
      <div class="h-meta">
        <span>${h.cats.map((cid,i)=>`<span style="color:${cat(cid).color}">${cat(cid).name}${i<h.cats.length-1?" · ":""}</span>`).join("")}</span>
        ${extra}
      </div>
    </div>
    <span class="h-xp mono" style="${malo?"color:#FF5C5C":mult>1?"color:#FFD700":""}">${malo?"−":"+"}${xpMostrar}xp</span>
    <button class="h-del" onclick="borrarHabit('${h.id}')">✕</button>
  </div>`;
}

// ---- página de logros ----
function renderLogros(ctx){
  const fechaCorta = f => new Date(f).toLocaleDateString("es",{day:"numeric",month:"short"});

  // rachas
  let rachasHTML = "";
  for (const h of D.habits){
    let icoTxt, valTxt;
    if (h.tipo==="malo"){
      const l = limpios(h);
      icoTxt = "🛡️";
      valTxt = `<b style="color:#5EF0A0">${l.actual}</b> días limpio · récord <b>${l.record}</b>`;
    } else if (h.freq.tipo==="semanal"){
      const total = fechasDe(h.id).length;
      icoTxt = "📅";
      valTxt = `<b style="color:#FFD700">${vecesSemana(h.id)}/${h.freq.objetivo}</b> esta semana · ${total} en total`;
    } else {
      const rec = recordRacha(h.id);
      icoTxt = "🔥";
      valTxt = `<b style="color:#FFB454">${racha(h.id)}</b> días · récord <b>${rec}</b>`;
    }
    rachasHTML += `<div class="logro">
      <div class="l-ico">${icoTxt}</div>
      <div class="l-txt"><div class="l-n">${esc(h.name)}</div></div>
      <div class="l-p">${valTxt}</div>
    </div>`;
  }

  // títulos
  const catalogoTitulos = [
    ...CATS.map(c=>({n:TITULOS_STAT[c.id], d:`Haz que ${c.name} domine tu polígono`, ico:"⬟", color:c.color})),
    {n:"Pentágono Perfecto", d:"Las 5 stats a ≥30 y en equilibrio", ico:"⬠", color:"#FFD700"},
    ...D.habits.filter(h=>h.tipo==="bueno"&&h.freq.tipo==="semanal").map(h=>({
      n:h.titulo||("Maestro: "+h.name), d:`${h.name} · ${h.freq.objetivo}x/semana`, ico:"👑", color:"#FFD700"})),
    {n:"Corrompido", d:"3+ caídas en vicios en una semana · título oscuro", ico:"💀", color:"#FF5C5C", oscuro:true},
  ];
  let titulosHTML = catalogoTitulos.map(t=>{
    const fecha = D.meta.titulos[t.n];
    const on = !!fecha;
    return `<div class="logro ${on?(t.oscuro?"oscuro":"on"):"off"}">
      <div class="l-ico" style="color:${t.color}">${t.ico}</div>
      <div class="l-txt">
        <div class="l-n" style="${on?`color:${t.color}`:""}">${esc(t.n)}</div>
        <div class="l-d">${esc(t.d)}</div>
      </div>
      <div class="l-p">${on?fechaCorta(fecha):"🔒"}</div>
    </div>`;
  }).join("");

  // logros
  let logrosHTML = LOGROS.map(l=>{
    const fecha = D.meta.logros[l.id];
    const on = !!fecha;
    return `<div class="logro ${on?"on":"off"}">
      <div class="l-ico">${l.ico}</div>
      <div class="l-txt">
        <div class="l-n" style="${on?"color:#FFD700":""}">${l.n}</div>
        <div class="l-d">${l.d}</div>
      </div>
      <div class="l-p">${on?fechaCorta(fecha):l.prog(ctx)}</div>
    </div>`;
  }).join("");

  const nLogros = Object.keys(D.meta.logros).length;
  const nTitulos = Object.keys(D.meta.titulos).length;
  document.getElementById("pag-logros").innerHTML = `
    <div class="pag-titulo">Sala de trofeos</div>
    <div class="pag-sub">${nLogros}/${LOGROS.length} logros · ${nTitulos}/${catalogoTitulos.length} títulos</div>
    <div class="sec-logros">🔥 Rachas</div>${rachasHTML}
    <div class="sec-logros">👑 Títulos</div>${titulosHTML}
    <div class="sec-logros">🏆 Logros</div>${logrosHTML}`;
}

function render(){
  const { valores, decayendo, xpTotal, totalBuenas } = calcular();
  const nivel = nivelDe(xpTotal);
  const base = xpNivel(nivel), sig = xpNivel(nivel+1);
  const prog = sig>base ? (xpTotal-base)/(sig-base) : 0;

  const caidas = D.habits.filter(h=>h.tipo==="malo").reduce((a,h)=>a+vecesSemana(h.id),0);
  let tit;
  const mx=Math.max(...valores), mn=Math.min(...valores);
  if (caidas>=3) tit={n:"Corrompido", d:caidas+" caídas esta semana", c:"#FF5C5C"};
  else if (mn>=30 && mx-mn<=12) tit={n:"Pentágono Perfecto", d:"Todas las stats en equilibrio", c:"#FFD700"};
  else if (mx>=20){ const i=valores.indexOf(mx); tit={n:TITULOS_STAT[CATS[i].id], d:CATS[i].name+" domina tu polígono", c:CATS[i].color}; }
  else tit={n:"Novato", d:"Tu leyenda acaba de empezar", c:"#8B93B8"};

  const coronas = D.habits.filter(h=>h.tipo==="bueno"&&h.freq.tipo==="semanal"&&vecesSemana(h.id)>=h.freq.objetivo)
    .map(h=>h.titulo||("Maestro: "+h.name));

  // registrar títulos y logros conseguidos (permanentes)
  const F = hoy();
  if (tit.n!=="Novato" && !D.meta.titulos[tit.n]) D.meta.titulos[tit.n]=F;
  coronas.forEach(t=>{ if(!D.meta.titulos[t]) D.meta.titulos[t]=F; });
  const ctx = {
    totalBuenas, nivel,
    mejorRacha: Math.max(0, ...D.habits.filter(h=>h.tipo==="bueno"&&h.freq.tipo==="diario").map(h=>recordRacha(h.id))),
    mejorLimpio: Math.max(0, ...D.habits.filter(h=>h.tipo==="malo").map(h=>limpios(h).record)),
  };
  LOGROS.forEach(l=>{ if(l.check(ctx) && !D.meta.logros[l.id]) D.meta.logros[l.id]=F; });
  guardar();

  document.getElementById("header").innerHTML = `
    <div class="fila-top">
      <div>
        <div class="lbl">Nivel ${nivel}</div>
        <div class="titulo" style="color:${tit.c}">${tit.n}</div>
        <div class="desc">${tit.d}</div>
      </div>
      <div style="text-align:right">
        <div class="lbl">XP total</div>
        <div class="mono xp">${xpTotal}</div>
      </div>
    </div>
    ${coronas.length?`<div class="chips">${coronas.map(t=>`<span class="chip">👑 ${esc(t)}</span>`).join("")}</div>`:""}
    <div class="barra"><div style="width:${Math.round(prog*100)}%"></div></div>`;

  document.getElementById("radarwrap").innerHTML = radarSVG(valores, decayendo);
  document.getElementById("statsnum").innerHTML = CATS.map((c,i)=>`
    <div>
      <b class="mono" style="color:${c.color}">${valores[i]}${decayendo[i]?'<span style="color:#FF5C5C">▼</span>':""}</b>
      <div class="mini-barra"><div style="width:${valores[i]}%;background:${c.color}"></div></div>
    </div>`).join("");
  document.getElementById("decayaviso").innerHTML = decayendo.some(Boolean)
    ? `<div class="aviso-decay">▼ Stats decayendo: más de ${DECAY_GRACIA} días sin actividad en esa categoría</div>` : "";

  const buenos = D.habits.filter(h=>h.tipo==="bueno");
  const malos = D.habits.filter(h=>h.tipo==="malo");
  const hechos=(D.log[F]||[]).filter(id=>buenos.some(b=>b.id===id)).length;
  document.getElementById("contador").textContent = `Hoy · ${hechos}/${buenos.length}`;
  document.getElementById("lista-buenos").innerHTML =
    buenos.length ? buenos.map(filaHabito).join("") : '<div class="vacio">Aún no hay hábitos. Pulsa <b>+ Hábito</b>.</div>';
  document.getElementById("seccion-malos").innerHTML = malos.length
    ? `<div class="seccion-mal">☠ Vicios · solo marca si caes</div>` + malos.map(filaHabito).join("") : "";

  renderLogros(ctx);
}

  const DOW_SHORT = ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];
  const DOW_ICS = ['SU','MO','TU','WE','TH','FR','SA'];
  const MONTH = {'enero':0,'febrero':1,'marzo':2,'abril':3,'mayo':4,'junio':5,'julio':6,'agosto':7,
    'septiembre':8,'setiembre':8,'octubre':9,'noviembre':10,'diciembre':11};
  const MONTH_NAME = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  function wordToNum(w){
    w = w.trim();
    if(/^\d+$/.test(w)) return parseInt(w,10);
    if(w in NUM) return NUM[w];
    let m = w.match(/^(treinta|veinte)\s+y\s+([a-záéíóú]+)$/);
    if(m && (m[2] in NUM)) return (m[1]==='treinta'?30:20) + NUM[m[2]];
    return null;
  }

  /* ---------- extractores ---------- */
  function extractTime(t){
    let matched = null, h=null, min=0;
    if(/\bmediod[ií]a\b/.test(t)){ h=12; min=0; matched='mediodía'; }
    else if(/\bmedianoche\b/.test(t)){ h=0; min=0; matched='medianoche'; }
    else {
      const numWord = 'una|uno|dos|tres|cuatro|cinco|seis|siete|ocho|nueve|diez|once|doce|trece|catorce|quince|dieciseis|dieciséis|diecisiete|dieciocho|diecinueve|veinte|veinti[a-záéíóú]+';
      const re = new RegExp(
        '\\ba\\s+las?\\s+(\\d{1,2}(?:[:h\\.]\\d{2})?|'+numWord+')' +
        '(\\s+y\\s+media|\\s+y\\s+cuarto|\\s+menos\\s+cuarto|\\s+y\\s+(?:diez|veinte|veinticinco|cinco))?' +
        '(\\s+de\\s+la\\s+(?:mañana|tarde|noche|madrugada))?','i');
      const m = t.match(re);
      if(m){
        matched = m[0];
        let hp = m[1];
        let mm = hp.match(/^(\d{1,2})[:h\.](\d{2})$/);
        if(mm){ h=+mm[1]; min=+mm[2]; }
        else if(/^\d+$/.test(hp)){ h=+hp; }
        else { h = wordToNum(hp); if(h==null) h=0; }
        if(m[2]){
          if(/media/.test(m[2])) min=30;
          else if(/menos\s+cuarto/.test(m[2])){ min=45; h=(h+23)%24; }
          else if(/cuarto/.test(m[2])) min=15;
          else if(/diez/.test(m[2])) min=10;
          else if(/veinticinco/.test(m[2])) min=25;
          else if(/veinte/.test(m[2])) min=20;
          else if(/cinco/.test(m[2])) min=5;
        }
        const fr = m[3]||'';
        if(/tarde|noche/.test(fr) && h<12) h+=12;
        if(/mañana|madrugada/.test(fr) && h===12) h=0;
      }
    }
    if(h===null){
      if(/\bpor\s+la\s+mañana\b/.test(t)){ h=9; min=0; matched='por la mañana'; }
      else if(/\bpor\s+la\s+tarde\b/.test(t)){ h=17; min=0; matched='por la tarde'; }
      else if(/\bpor\s+la\s+noche\b/.test(t)){ h=21; min=0; matched='por la noche'; }
    }
    if(h===null) return null;
    h = ((h%24)+24)%24;
    return {h, m:min, matched};
  }

  function extractDate(t, now){
    const mk = (off)=>{ const d=new Date(now); d.setHours(0,0,0,0); d.setDate(d.getDate()+off); return d; };
    let m = t.match(/\b(dentro\s+de|en)\s+(\d+|un|una|dos|tres|cuatro|cinco|seis|siete|ocho|nueve|diez|media)\s+(minutos?|horas?|d[ií]as?|semanas?|mes(?:es)?)\b/);
    if(m){
      let n = m[2]==='media' ? 0.5 : wordToNum(m[2]); if(n==null) n=1;
      const d = new Date(now); const u = m[3];
      if(/minuto/.test(u)) d.setMinutes(d.getMinutes()+n);
      else if(/hora/.test(u)) d.setMinutes(d.getMinutes()+n*60);
      else if(/d[ií]a/.test(u)) d.setDate(d.getDate()+n);
      else if(/semana/.test(u)) d.setDate(d.getDate()+n*7);
      else if(/mes/.test(u)) d.setMonth(d.getMonth()+n);
      return {date:d, matched:m[0], exact:true};
    }
    if(/pasado\s+mañana/.test(t)) return {date:mk(2), matched:'pasado mañana', exact:false};
    if(/\besta\s+mañana\b/.test(t)) return {date:mk(0), matched:'esta mañana', exact:false};
    const tMask = t.replace(/(de|por)\s+la\s+mañana/g,'##');
    if(/\bmañana\b/.test(tMask)) return {date:mk(1), matched:'mañana', exact:false};
    if(/\bhoy\b|\besta\s+(tarde|noche)\b/.test(t)){
      const mm = t.match(/\besta\s+(tarde|noche)\b/);
      return {date:mk(0), matched: mm?mm[0]:'hoy', exact:false};
    }
    m = t.match(/\b(este\s+|el\s+pr[oó]ximo\s+|pr[oó]ximo\s+|el\s+|los\s+)?(lunes|martes|mi[eé]rcoles|jueves|viernes|s[aá]bado|domingo)\b/);
    if(m){
      const target = DOW[m[2]];
      let delta = (target - now.getDay() + 7) % 7;
      if(delta===0) delta = 7;
      return {date:mk(delta), matched:m[0], dow:target, exact:false};
    }
    m = t.match(/\bel\s+(\d{1,2}|[a-záéíóú]+)\s+de\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|setiembre|octubre|noviembre|diciembre)\b/);
    if(m){
      let day = wordToNum(m[1]); if(day==null) return null;
      const mo = MONTH[m[2]]; let year = now.getFullYear();
      let d = new Date(year, mo, day, 0,0,0,0);
      if(d < new Date(now.getFullYear(),now.getMonth(),now.getDate())) d = new Date(year+1, mo, day);
      return {date:d, matched:m[0], exact:false};
    }
    m = t.match(/\bel\s+(\d{1,2})\b/);
    if(m){
      let day = +m[1];
      if(day>=1 && day<=31){
        let d = new Date(now.getFullYear(), now.getMonth(), day, 0,0,0,0);
        const today = new Date(now.getFullYear(),now.getMonth(),now.getDate());
        if(d < today) d = new Date(now.getFullYear(), now.getMonth()+1, day);
        return {date:d, matched:m[0], exact:false};
      }
    }
    return null;
  }

  function extractRecurrence(t){
    if(/\b(todos\s+los\s+d[ií]as|cada\s+d[ií]a|a\s+diario|diariamente)\b/.test(t)){
      const m = t.match(/\b(todos\s+los\s+d[ií]as|cada\s+d[ií]a|a\s+diario|diariamente)\b/);
      return {type:'daily', matched:m[0]};
    }
    let m = t.match(/\b(todos\s+los|cada|los)\s+(lunes|martes|mi[eé]rcoles|jueves|viernes|s[aá]bado|domingo)s?\b/);
    if(m) return {type:'weekly', dow:DOW[m[2]], matched:m[0]};
    if(/\b(cada\s+semana|todas\s+las\s+semanas|semanalmente)\b/.test(t)){
      const mm = t.match(/\b(cada\s+semana|todas\s+las\s+semanas|semanalmente)\b/);
      return {type:'weekly', matched:mm[0]};
    }
    return null;
  }

  function cleanTitle(t, removals){
    let s = ' ' + t + ' ';
    removals.filter(Boolean).sort((a,b)=>b.length-a.length).forEach(r=>{ s = s.split(r).join(' '); });
    s = s.replace(/^\s*(recu[eé]rda(me)?|recu[eé]rda|recordar|no\s+olvides?(\s+de)?|ap[uú]nta(me)?|an[oó]ta(me)?|a[ñn]ade|agrega|pon(me)?|crea|programa|nuevo\s+evento|evento|recordatorio|tarea)\s+/i,' ');
    s = s.replace(/^\s*(que|de|a|el|la)\s+/i,' ');
    s = s.replace(/\b(a\s+las?|el|los|este|pr[oó]ximo|de\s+la)\s*$/i,' ');
    s = s.replace(/\s+/g,' ').trim();
    s = s.replace(/[,;.\s]+$/,'').replace(/^[,;.\s]+/,'');
    if(!s) return 'Recordatorio';
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  function parseVoz(input, now){
    now = now || new Date();
    const t = input.toLowerCase();
    const rec  = extractRecurrence(t);
    const time = extractTime(t);
    let   dInfo = extractDate(t, now);
    if(rec && rec.type==='weekly' && rec.dow!=null && !dInfo){
      let delta = (rec.dow - now.getDay() + 7) % 7; if(delta===0) delta = 7;
      const d = new Date(now); d.setHours(0,0,0,0); d.setDate(d.getDate()+delta);
      dInfo = {date:d, exact:false, matched:''};
    }
    let date, hasTime;
    if(dInfo && dInfo.exact){ date = dInfo.date; hasTime = true; }
    else {
      date = dInfo ? new Date(dInfo.date) : (()=>{ const d=new Date(now); d.setHours(0,0,0,0); return d; })();
      if(time){ date.setHours(time.h, time.m, 0, 0); hasTime = true; }
      else { date.setHours(9,0,0,0); hasTime = false; }
      if(!dInfo && hasTime && date < now && !rec){ date.setDate(date.getDate()+1); }
    }
    const title = cleanTitle(input, [ dInfo && dInfo.matched, time && time.matched, rec && rec.matched ]);
    let recurrence = null;
    if(rec){
      if(rec.type==='daily') recurrence = {type:'daily'};
      else if(rec.type==='weekly') recurrence = {type:'weekly', dow: rec.dow!=null?rec.dow:date.getDay()};
    }
    return { title, date, hasTime, recurrence, raw: input };
  }

  /* ---------- helpers ---------- */
  function pad(n){ return (n<10?'0':'')+n; }
  function agEsc(s){ return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
  function ymd(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function lunesDe(d){ const x=new Date(d); x.setHours(0,0,0,0); x.setDate(x.getDate()-((x.getDay()+6)%7)); return x; }

  /* ---------- ocurrencias de la semana (expande repetidos) ---------- */
  function ocurrenciasSemana(lunes){
    const res = {};                                  // ymd -> [{ev, ts}]
    const dias = [];
    for(let i=0;i<7;i++){ const d=new Date(lunes); d.setDate(d.getDate()+i); dias.push(d); res[ymd(d)]=[]; }
    (D.eventos||[]).forEach(ev=>{
      const base = new Date(ev.ts);
      const base0 = new Date(base); base0.setHours(0,0,0,0);
      if(!ev.recurrence){
        const k = ymd(base);
        if(k in res) res[k].push({ev, ts:ev.ts});
      } else {
        dias.forEach(d=>{
          if(d < base0) return;                      // no antes de su primera fecha
          const ok = ev.recurrence.type==='daily' || d.getDay()===ev.recurrence.dow;
          if(!ok) return;
          const o = new Date(d); o.setHours(base.getHours(), base.getMinutes(), 0, 0);
          res[ymd(d)].push({ev, ts:+o});
        });
      }
    });
    Object.keys(res).forEach(k=>res[k].sort((a,b)=>a.ts-b.ts));
    return {dias, res};
  }

  /* ---------- estado (en D.eventos, entra en el backup) ---------- */
  function addEvento(ev){
    if(!D.eventos) D.eventos=[];
    D.eventos.push({
      id: Date.now()+''+Math.floor(Math.random()*1000),
      title: ev.title, ts: ev.date.getTime(), hasTime: ev.hasTime, recurrence: ev.recurrence||null
    });
    D.eventos.sort((a,b)=>a.ts-b.ts);
    guardar(); renderAgenda(); scheduleLocal();
  }
  function delEvento(id){
    const ev=(D.eventos||[]).find(e=>e.id===id);
    if(ev && ev.recurrence && !confirm('Este evento se repite. ¿Borrar toda la serie?')) return;
    D.eventos = (D.eventos||[]).filter(e=>e.id!==id);
    guardar(); renderAgenda();
  }

  /* ---------- .ics -> Calendario nativo de iOS ---------- */
  function escapeICS(s){ return String(s).replace(/[\\;,]/g,m=>'\\'+m).replace(/\n/g,'\\n'); }
  function icsLocal(d){ return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'T'+pad(d.getHours())+pad(d.getMinutes())+'00'; }
  function icsDate(d){ return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate()); }
  function buildICS(e){
    const start = new Date(e.ts);
    const st = new Date();
    const dtstamp = st.getUTCFullYear()+pad(st.getUTCMonth()+1)+pad(st.getUTCDate())+'T'+
                    pad(st.getUTCHours())+pad(st.getUTCMinutes())+pad(st.getUTCSeconds())+'Z';
    let L = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Habitos RPG//Agenda//ES','CALSCALE:GREGORIAN',
      'BEGIN:VEVENT','UID:'+e.id+'@habitos-agenda','DTSTAMP:'+dtstamp];
    if(e.hasTime){
      L.push('DTSTART:'+icsLocal(start), 'DTEND:'+icsLocal(new Date(e.ts+30*60000)));
      L.push('BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:'+escapeICS(e.title),'TRIGGER:PT0M','END:VALARM');
    } else {
      L.push('DTSTART;VALUE=DATE:'+icsDate(start));
      L.push('BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:'+escapeICS(e.title),'TRIGGER:PT9H','END:VALARM');
    }
    if(e.recurrence){
      if(e.recurrence.type==='daily') L.push('RRULE:FREQ=DAILY');
      else if(e.recurrence.type==='weekly') L.push('RRULE:FREQ=WEEKLY;BYDAY='+DOW_ICS[e.recurrence.dow]);
    }
    L.push('SUMMARY:'+escapeICS(e.title),'END:VEVENT','END:VCALENDAR');
    return L.join('\r\n');
  }
  function exportICS(e){
    const blob = new Blob([buildICS(e)], {type:'text/calendar;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (e.title.replace(/[^\wáéíóúñ ]/gi,'').trim()||'evento') + '.ics';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
    agToast('Abriendo Calendario de iOS…');
  }

  /* ---------- notificación local (extra, con la app abierta) ---------- */
  let timers = [];
  function scheduleLocal(){
    timers.forEach(clearTimeout); timers = [];
    if(!('Notification' in window) || Notification.permission!=='granted') return;
    const now = Date.now();
    (D.eventos||[]).filter(e=>e.hasTime && e.ts>now && e.ts-now < 24*3600000).forEach(e=>{
      timers.push(setTimeout(()=>{ try{ new Notification('◆ '+e.title, {body:'Es la hora.'}); }catch(_){} }, e.ts-now));
    });
  }
  function askNotif(){
    if('Notification' in window && Notification.permission==='default'){
      Notification.requestPermission().then(()=>scheduleLocal());
    }
  }

  /* ---------- vista semanal ---------- */
  let semanaOffset = 0;

  function renderAgenda(){
    const el = document.getElementById('ag-sem'); if(!el) return;
    const hoy0 = new Date(); hoy0.setHours(0,0,0,0);
    const lunes = lunesDe(new Date());
    lunes.setDate(lunes.getDate() + semanaOffset*7);
    const {dias, res} = ocurrenciasSemana(lunes);

    const fin = new Date(lunes); fin.setDate(fin.getDate()+6);
    const rango = lunes.getDate()+' '+(lunes.getMonth()===fin.getMonth()?'':MONTH_NAME[lunes.getMonth()].slice(0,3)+' ')+
                  '– '+fin.getDate()+' '+MONTH_NAME[fin.getMonth()].slice(0,3);
    const nTareas = dias.reduce((a,d)=>a+res[ymd(d)].length,0);

    let html =
      '<div class="ag-wnav">'+
        '<button class="ag-wbtn" data-w="-1">◀</button>'+
        '<div class="ag-wttl"><b>'+(semanaOffset===0?'Esta semana':rango)+'</b>'+
          '<span>'+(semanaOffset===0?rango:'')+(semanaOffset!==0?'<button class="ag-whoy" data-w="0">volver a hoy</button>':' · '+nTareas+' tareas')+'</span></div>'+
        '<button class="ag-wbtn" data-w="1">▶</button>'+
      '</div>';

    dias.forEach(d=>{
      const k = ymd(d);
      const evs = res[k];
      const esHoy = +d===+hoy0;
      const pasado = d < hoy0;
      const marcas = (D.log[k]||[]).length;                 // actividad de hábitos ese día
      html += '<div class="ag-dia'+(esHoy?' hoy':'')+(pasado?' pasado':'')+'">'+
        '<div class="ag-dhdr">'+
          '<span class="ag-ddw">'+DOW_SHORT[d.getDay()]+'</span>'+
          '<span class="ag-dnum">'+d.getDate()+'</span>'+
          (esHoy?'<span class="ag-dtag">hoy</span>':'')+
          (marcas?'<span class="ag-dhab" title="hábitos completados">✦ '+marcas+'</span>':'')+
        '</div>';
      if(evs.length===0){
        html += '<div class="ag-libre">—</div>';
      } else {
        evs.forEach(o=>{
          const e = o.ev;
          const rep = e.recurrence ? ' rep':'';
          const col = e.hasTime
            ? '<span class="t">'+pad(new Date(o.ts).getHours())+':'+pad(new Date(o.ts).getMinutes())+'</span>'
            : '<span class="ad">día</span>';
          const bg = e.recurrence ? '<span class="bg">↻</span>' : '';
          html += '<div class="ag-ev'+rep+'">'+col+
            '<span class="nm">'+agEsc(e.title)+'</span>'+bg+
            '<span class="ac">'+
              '<button class="ag-ib" data-cal="'+e.id+'" title="Añadir al Calendario de iOS">📅</button>'+
              '<button class="ag-ib" data-del="'+e.id+'" title="Borrar">✕</button>'+
            '</span></div>';
        });
      }
      html += '</div>';
    });

    if(nTareas===0 && (D.eventos||[]).length===0){
      html += '<div class="ag-empty"><b>Semana despejada</b>Dicta tu primera misión arriba.</div>';
    }
    el.innerHTML = html;
  }

  /* ---------- preview editable ---------- */
  function showPreview(p){
    const box = document.getElementById('ag-preview');
    const d = p.date;
    const dateStr = d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    const timeStr = pad(d.getHours())+':'+pad(d.getMinutes());
    box.innerHTML =
      '<div class="ag-prev">'+
        '<div class="l">Misión</div>'+
        '<div class="r"><input id="ag-p-title" value="'+agEsc(p.title)+'"></div>'+
        '<div class="r">'+
          '<div class="h"><div class="l">Día</div><input id="ag-p-date" type="date" value="'+dateStr+'"></div>'+
          '<div class="h"><div class="l">Hora</div><input id="ag-p-time" type="time" value="'+timeStr+'"></div>'+
        '</div>'+
        '<div class="r">'+
          '<div class="h"><div class="l">Repetir</div><select id="ag-p-rep">'+
            '<option value="">No repetir</option>'+
            '<option value="daily"'+(p.recurrence&&p.recurrence.type==='daily'?' selected':'')+'>Cada día</option>'+
            '<option value="weekly"'+(p.recurrence&&p.recurrence.type==='weekly'?' selected':'')+'>Cada semana (ese día)</option>'+
          '</select></div>'+
          '<div class="h"><div class="l">&nbsp;</div><label class="ck"><input type="checkbox" id="ag-p-ht"'+(p.hasTime?' checked':'')+'> con hora</label></div>'+
        '</div>'+
        '<div class="acts"><button id="ag-no">Descartar</button><button id="ag-ok">✓ Guardar</button></div>'+
      '</div>';
    document.getElementById('ag-ok').addEventListener('click',()=>{
      const title = document.getElementById('ag-p-title').value.trim() || 'Recordatorio';
      const dv = document.getElementById('ag-p-date').value.split('-').map(Number);
      const tv = document.getElementById('ag-p-time').value.split(':').map(Number);
      const hasTime = document.getElementById('ag-p-ht').checked;
      const dt = new Date(dv[0], dv[1]-1, dv[2], hasTime?tv[0]:9, hasTime?tv[1]:0, 0, 0);
      const rv = document.getElementById('ag-p-rep').value;
      let recurrence = null;
      if(rv==='daily') recurrence={type:'daily'};
      else if(rv==='weekly') recurrence={type:'weekly', dow:dt.getDay()};
      // si el evento cae fuera de la semana visible, vuelve a la semana del evento
      const lunEv = lunesDe(dt), lunHoy = lunesDe(new Date());
      semanaOffset = Math.round((lunEv - lunHoy)/(7*864e5));
      addEvento({title, date:dt, hasTime, recurrence});
      box.innerHTML='';
      const ta=document.getElementById('ag-texto'); if(ta){ ta.value=''; ta.style.height='auto'; }
      agToast('Misión guardada ✓');
    });
    document.getElementById('ag-no').addEventListener('click',()=>{ box.innerHTML=''; });
  }

  /* ---------- toast ---------- */
  let toastT;
  function agToast(msg){
    let el = document.getElementById('ag-toast');
    if(!el){ el=document.createElement('div'); el.className='ag-toast'; el.id='ag-toast'; document.body.appendChild(el); }
    el.textContent=msg; el.classList.add('show');
    clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'), 2200);
  }

  /* ---------- init ---------- */
  function initAgenda(){
    const host = document.getElementById('pag-agenda'); if(!host) return;
    host.innerHTML =
      '<div class="ag-h1">◆ Agenda</div>'+
      '<div class="ag-sub">Dicta lo que tengas que hacer · calendario semanal</div>'+
      '<div class="ag-cap">'+
        '<label>Nueva entrada</label>'+
        '<div class="ag-bar">'+
          '<textarea id="ag-texto" rows="1" placeholder="Toca aquí, pulsa el 🎤 del teclado y habla…"></textarea>'+
          '<button id="ag-add" aria-label="Añadir">＋</button>'+
        '</div>'+
        '<div class="ag-tip"><b>Ej.:</b> "cada lunes reunión a las 9" · "el jueves dentista a las 5 y media"</div>'+
        '<div id="ag-preview"></div>'+
      '</div>'+
      '<div class="ag-list" id="ag-sem"></div>'+
      '<div class="ag-back">Inicio ▶</div>';
    const ta = document.getElementById('ag-texto');
    ta.addEventListener('input', ()=>{ ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,140)+'px'; });
    document.getElementById('ag-add').addEventListener('click', ()=>{
      const raw = ta.value.trim(); if(!raw){ ta.focus(); return; }
      askNotif(); showPreview(parseVoz(raw, new Date()));
    });
    document.getElementById('ag-sem').addEventListener('click', (e)=>{
      const w = e.target.closest('[data-w]');
      if(w){ const v=w.dataset.w; semanaOffset = (v==='0') ? 0 : semanaOffset + (+v); renderAgenda(); return; }
      const cal = e.target.closest('[data-cal]'); const del = e.target.closest('[data-del]');
      if(cal){ const ev=(D.eventos||[]).find(x=>x.id===cal.dataset.cal); if(ev) exportICS(ev); }
      if(del){ delEvento(del.dataset.del); }
    });
    renderAgenda();
  }

  initAgenda();
  scheduleLocal();
})();

// abrir en la página de Inicio (índice 1), no en la Agenda
function irAInicio(){ pagEl.scrollLeft = pagEl.clientWidth; actualizarDots(); }
requestAnimationFrame(irAInicio);
setTimeout(irAInicio, 60);
</script>
